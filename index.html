
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Word Wand v9.3.1</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css?v=9.3.1" />
</head>
<body>
  <main>
    <section id="welcome" class="screen">
      <div class="left">
        <h1 class="title">Welcome to Word Wand!</h1>
        <p class="subtitle">Please select an option below.</p>

        <div class="controls">
          <input id="textInput" class="textLarge" type="text" maxlength="24" placeholder="add text here" />

          <label class="chip">Color
            <select id="colorSelect">
              <option value="#ffffff">White</option>
              <option value="#ff0000">Red</option>
              <option value="#00ff00">Green</option>
              <option value="#00ffff">Cyan</option>
              <option value="disco">Disco 🌈</option>
            </select>
          </label>

          <label id="discoSpeedWrap" class="chip" style="display:none;">Disco speed
            <input id="discoSpeed" type="range" min="0.2" max="5" step="0.1" value="1.8" />
            <span id="discoSpeedVal" class="mono">1.8×</span>
          </label>

          <label class="chip">Duration
            <select id="durationSelect">
              <option value="10000">10s</option>
              <option value="20000" selected>20s</option>
              <option value="30000">30s</option>
              <option value="Infinity">∞ No limit</option>
            </select>
          </label>

          <label class="chip">Auto‑mirror <input id="autoMirrorChk" type="checkbox" checked /></label>
          <label class="chip">Haptics <input id="hapticsChk" type="checkbox" checked /></label>

          <button id="goBtn" class="cta" disabled>Go</button>

          <div class="rowBtns">
            <button id="helpBtn" class="chip small">Help</button>
            <button id="resetBtn" class="chip small">Reset App Cache</button>
            <button id="debugToggle" class="chip small">Debug</button>
          </div>
        </div>
      </div>

      <!-- Magician intentionally disabled for this build -->
      <div class="right" style="display:none"></div>
    </section>

    <canvas id="wand" aria-label="POV display"></canvas>
    <button id="stopBtn" class="stopBtn" style="display:none;">Stop</button>

    <div id="debugPanel" class="debug" style="display:none;"></div>

    <dialog id="helpDialog">
      <h3>Help</h3>
      <ol>
        <li>Type a word (max 24 characters).</li>
        <li>Press <b>Go</b> — sensors start after this tap.</li>
        <li>Sweep left↔right for 2–3 seconds; auto‑mirror keeps letters readable.</li>
      </ol>
      <button id="closeHelp">Close</button>
    </dialog>
  </main>

  <script src="app.js?v=9.3.1"></script>
  <script>
    // Sanity pings to verify JS is running
    console.log('WW v9.3.1: index.html loaded');
    window.addEventListener('DOMContentLoaded', ()=>console.log('WW v9.3.1: DOM ready'));
  </script>
</body>
</html>
